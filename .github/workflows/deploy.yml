name: Deploy Frontend

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: CI=false npm run build

      - name: Deploy build to Nginx
        run: |
          rsync -avz --delete ./build/ /var/www/frontend/
          sudo systemctl reload nginx
